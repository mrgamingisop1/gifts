<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link type="text/css" rel="stylesheet" href="file/default.css">

    <script src="file/jquery.min.js"></script>
    <script src="file/jscex.min.js"></script>
    <script src="file/jscex-parser.js"></script>
    <script src="file/jscex-jit.js"></script>
    <script src="file/jscex-builderbase.min.js"></script>
    <script src="file/jscex-async.min.js"></script>
    <script src="file/jscex-async-powerpack.min.js"></script>
    <script src="file/function.js" charset="utf-8"></script>
    <script src="file/love.js" charset="utf-8"></script>

    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
</head>

<body>

    <div class="background-glow"></div>

    <div id="main">

        <audio id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
        </audio>

        <div id="wrap">

            <div class="photo photo-left">
                <img src="img.png" alt="Birthday Image">
            </div>

            <div class="photo photo-right">
                <img src="img2.png" alt="Birthday Image">
            </div>

            <div id="text">
                <div id="code">
                    <span class="say">Hey you 💞</span><br>
                    <span class="say">Happy Birthday 🍰🎈</span><br>
                    <span class="say">May God bless you ✨🍀</span><br>
                    <span class="say">And give you many happiness 💕</span><br>
                    <span class="say">Just saying.. you're pretty awesome ❤️</span><br>
                    <span class="say">Hope you always succeed in life.🤞🏻</span><br>
                    <span class="say">Enjoy your special day!💗</span><br>
                </div>
            </div>

            <div id="clock-box">
                <span id="clock"></span>
            </div>

            <canvas id="canvas" width="1100" height="680"></canvas>

        </div>
    </div>

    <script>
        (function () {
            var canvas = $('#canvas');

            if (!canvas[0].getContext) {
                return false;
            }

            var width = 1100;
            var height = 680;

            canvas.attr("width", width);
            canvas.attr("height", height);

            var opts = {
                seed: {
                    x: width / 2 - 20,
                    color: "rgb(190, 26, 37)",
                    scale: 2
                },
                branch: [
                    [535, 680, 570, 250, 500, 200, 30, 100, [
                        [540, 500, 455, 417, 340, 400, 13, 100, [
                            [450, 435, 434, 430, 394, 395, 2, 40]
                        ]],
                        [550, 445, 600, 356, 680, 345, 12, 100, [
                            [578, 400, 648, 409, 661, 426, 3, 80]
                        ]],
                        [539, 281, 537, 248, 534, 217, 3, 40],
                        [546, 397, 413, 247, 328, 244, 9, 80, [
                            [427, 286, 383, 253, 371, 205, 2, 40],
                            [498, 345, 435, 315, 395, 330, 4, 60]
                        ]],
                        [546, 357, 608, 252, 678, 221, 6, 100, [
                            [590, 293, 646, 277, 648, 271, 2, 80]
                        ]]
                    ]]
                ],
                bloom: {
                    num: 700,
                    width: 1080,
                    height: 650,
                },
                footer: {
                    width: 1200,
                    height: 5,
                    speed: 10,
                }
            };

            var tree = new Tree(canvas[0], width, height, opts);
            var seed = tree.seed;
            var foot = tree.footer;

            canvas.click(function (e) {

                var offset = canvas.offset(), x, y;
                const scaleX = canvas[0].getBoundingClientRect().width / canvas[0].width;
                const scaleY = canvas[0].getBoundingClientRect().height / canvas[0].height;

                x = (e.pageX - offset.left) / scaleX;
                y = (e.pageY - offset.top) / scaleY;

                if (seed.hover(x, y)) {
                    playAudio();

                    hold = 0;
                    document.querySelectorAll('.photo').forEach(el => {
                        el.classList.add('active');
                    });
                    canvas.unbind("click");
                    canvas.unbind("mousemove");
                    canvas.removeClass('hand');
                }
            }).mousemove(function (e) {
                var offset = canvas.offset(), x, y;
                const scaleX = canvas[0].getBoundingClientRect().width / canvas[0].width;
                const scaleY = canvas[0].getBoundingClientRect().height / canvas[0].height;

                x = (e.pageX - offset.left) / scaleX;
                y = (e.pageY - offset.top) / scaleY;
                canvas.toggleClass('hand', seed.hover(x, y));
            });

            var hold = 1;

            var seedAnimate = eval(Jscex.compile("async", function () {
                seed.draw();
                while (hold) {
                    $await(Jscex.Async.sleep(10));
                }
                while (seed.canScale()) {
                    seed.scale(0.95);
                    $await(Jscex.Async.sleep(10));
                }
                while (seed.canMove()) {
                    seed.move(0, 2);
                    foot.draw();
                    $await(Jscex.Async.sleep(10));
                }
            }));

            var growAnimate = eval(Jscex.compile("async", function () {
                do {
                    tree.grow();
                    $await(Jscex.Async.sleep(10));
                } while (tree.canGrow());
            }));

            var flowAnimate = eval(Jscex.compile("async", function () {
                do {
                    tree.flower(2);
                    $await(Jscex.Async.sleep(10));
                } while (tree.canFlower());
            }));

            var moveAnimate = eval(Jscex.compile("async", function () {

                tree.snapshot("p1", 0, 0, width, height);

                while (tree.move("p1", 185, 0)) {
                    foot.draw();
                    $await(Jscex.Async.sleep(10));
                }

                foot.draw();

                tree.snapshot("p2", 0, 0, width, height);

                canvas.parent().css("background", "none");
            }));
            function updateAgeClock() {

                const birthDate = new Date("2009-05-29T00:00:00");
                const now = new Date();

                let years = now.getFullYear() - birthDate.getFullYear();

                let lastBirthday = new Date(
                    now.getFullYear(),
                    birthDate.getMonth(),
                    birthDate.getDate()
                );

                if (now < lastBirthday) {
                    years--;

                    lastBirthday = new Date(
                        now.getFullYear() - 1,
                        birthDate.getMonth(),
                        birthDate.getDate()
                    );
                }

                let diff = now - lastBirthday;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));

                diff %= (1000 * 60 * 60 * 24);

                const hours = Math.floor(diff / (1000 * 60 * 60));

                diff %= (1000 * 60 * 60);

                const minutes = Math.floor(diff / (1000 * 60));

                diff %= (1000 * 60);

                const seconds = Math.floor(diff / 1000);

                document.getElementById("clock").innerHTML =
                    "You have been <span class='digit'>" + years + "</span> years, " +
                    "<span class='digit'>" + days + "</span> days, " +
                    "<span class='digit'>" + hours + "</span> hours, " +
                    "<span class='digit'>" + minutes + "</span> minutes, " +
                    "<span class='digit'>" + seconds + "</span> seconds old ❤️ (approx xD)";
            }

            var textAnimate = eval(Jscex.compile("async", function () {

                $("#code").show().typewriter();

                $("#clock-box").fadeIn(500);

                updateAgeClock();

                setInterval(updateAgeClock, 1000);
            }));

            var runAsync = eval(Jscex.compile("async", function () {
                $await(seedAnimate());
                $await(growAnimate());
                $await(flowAnimate());
                $await(moveAnimate());
                textAnimate().start();
            }));

            runAsync().start();
        })();
    </script>

</body>

</html>
